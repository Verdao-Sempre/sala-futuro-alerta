name: Alerta Sala do Futuro

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:
    inputs:
      enviar_ok:
        description: 'Enviar mensagem mesmo sem atividades novas?'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      modo_debug:
        description: 'Ativar modo debug? (envia dump da pagina pelo Telegram)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

permissions:
  contents: write

jobs:
  verificar:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o codigo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache de dependencias pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Executar verificacao
        env:
          RA: ${{ secrets.RA }}
          DIGITO: ${{ secrets.DIGITO }}
          SENHA: ${{ secrets.SENHA }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ENVIAR_OK: ${{ github.event.inputs.enviar_ok || 'true' }}
          MODO_DEBUG: ${{ github.event.inputs.modo_debug || 'false' }}
          TELEGRAM_MAX_LENGTH: '4000'
        run: python sala_futuro_alerta.py

      - name: Salvar estado no repositorio
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add atividades_salvas.json
          git diff --cached --quiet || git commit -m "chore: atualiza estado das atividades [skip ci]"
          git push