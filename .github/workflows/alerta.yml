name: Alerta Sala do Futuro

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

jobs:
  verificar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Baixar o codigo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Executar verificacao
        env:
          RA: ${{ secrets.RA }}
          DIGITO: ${{ secrets.DIGITO }}
          SENHA: ${{ secrets.SENHA }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python sala_futuro_alerta.py

      - name: Salvar estado no repositorio
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add atividades_salvas.json
          git diff --cached --quiet || git commit -m "chore: atualiza estado [skip ci]"
          git push
